name: Test & Lint

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  shellcheck:
    name: ShellCheck Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run ShellCheck on scripts
        run: shellcheck scripts/*.sh

  syntax-check:
    name: Bash Syntax Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check bash syntax
        run: bash -n scripts/*.sh

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install markdownlint
        run: sudo npm install -g markdownlint-cli 2>/dev/null || true
      - name: Lint markdown files (non-blocking)
        continue-on-error: true
        run: |
          echo "Checking markdown files..."
          find . -name "*.md" -not -path "./.git/*" | head -20

  file-structure:
    name: Repository Structure Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required files exist
        run: |
          required_files=(
            "README.md"
            "LICENSE"
            "CHANGELOG.md"
            "CONTRIBUTING.md"
            "SUPPORTED_DEVICES.md"
            "TEST_REPORT.md"
            "docs/full-guide.md"
            "docs/quick-start.md"
            "docs/troubleshooting.md"
            "docs/faq.md"
            "docs/security.md"
            "docs/uninstall.md"
            "scripts/setup.sh"
            "scripts/reset-sensor.sh"
            "scripts/verify-setup.sh"
            "configs/fprintd-resume.service"
            "configs/pam-fprintd.conf"
          )
          missing=false
          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "❌ Missing: $file"
              missing=true
            else
              echo "✅ Found: $file"
            fi
          done
          if [[ "$missing" == "true" ]]; then
            exit 1
          fi
          echo "All required files present."