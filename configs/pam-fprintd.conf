# =============================================================================
# PAM Configuration Samples — Linux Fingerprint Fix
# =============================================================================
# Sample PAM configurations for fingerprint authentication.
# Copy relevant lines to /etc/pam.d/ files as needed.
# IMPORTANT: Keep a root shell open when editing PAM files!
# =============================================================================

# -----------------------------------------------------------------------------
# CONFIG 1: Recommended — common-auth (password fallback)
# Add this ABOVE pam_unix.so line in /etc/pam.d/common-auth:
#
#   auth    [success=2 default=ignore]    pam_fprintd.so
#
# How it works:
#   success=2       → Fingerprint match skips next 2 lines (password prompt)
#   default=ignore  → Fingerprint failure falls through to password
#
# This is the SAFEST configuration. Even if the sensor fails, you can
# still authenticate with your password.
#
# Full example:
#   auth    [success=2 default=ignore]    pam_fprintd.so
#   auth    [success=1 default=ignore]    pam_unix.so nullok_secure
#   auth    requisite                     pam_deny.so
#   auth    required                      pam_permit.so

# -----------------------------------------------------------------------------
# CONFIG 2: Fingerprint for sudo only
# Add at TOP of /etc/pam.d/sudo (before @include lines):
#
#   auth       sufficient    pam_fprintd.so
#
# ⚠️ WARNING: 'sufficient' means fingerprint alone is enough.
# If the sensor is compromised or spoofed, an attacker can bypass
# password authentication entirely.
# Recommended: Use Config 1 ([success=2 default=ignore]) instead
# for defense in depth.

# -----------------------------------------------------------------------------
# CONFIG 3: Both fingerprint AND password required (high security)
# NOT recommended — sensor failure can lock you out.
#
#   auth    required    pam_fprintd.so
#   auth    required    pam_unix.so nullok_secure

# -----------------------------------------------------------------------------
# RECOVERY (if locked out by bad PAM config)
# Boot into recovery mode from GRUB → root shell → fix PAM:
#   mount -o remount,rw /
#   nano /etc/pam.d/common-auth
#   reboot

# -----------------------------------------------------------------------------
# QUICK REFERENCE: Control Flags
#
#   Flag          | Behavior                                | Use Case
#   --------------|-----------------------------------------|-----------------------
#   sufficient    | Fingerprint alone = pass. No password.  | Convenience (less secure)
#   required      | Must pass AND password must pass.       | High security (lockout risk)
#   optional      | Tried; failure doesn't block auth.      | Testing
#   [success=N]   | Custom behavior: skip N lines on pass.  | Best balance (recommended)